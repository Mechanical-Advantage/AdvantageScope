<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; connect-src ws: http: file: blob:"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; connect-src ws: http: file: blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="hub.css" />
    <link rel="stylesheet" href="renderers.css" />
    <script type="module" src="../bundles/hub.js"></script>
    <title data-i18n="hub.title"></title>
  </head>

  <body>
    <div class="title-bar" hidden>
      <div class="title-bar-text" data-i18n="hub.title"></div>
    </div>
    <div class="title-bar-menu">
      <table>
        <td><button data-i18n="[title]menu.titles.appTooltip;menu.titles.app"></button></td>
        <td><button data-i18n="[title]menu.titles.fileTooltip;menu.titles.file"></button></td>
        <td><button data-i18n="[title]menu.titles.viewTooltip;menu.titles.view"></button></td>
        <td><button data-i18n="[title]menu.titles.tabsTooltip;menu.titles.tabs"></button></td>
        <td class="hide-lite"><button data-i18n="[title]menu.titles.windowTooltip;menu.titles.window"></button></td>
        <td><button data-i18n="[title]menu.titles.helpTooltip;menu.titles.help"></button></td>
      </table>
    </div>

    <button class="tab-control update" data-i18n="[title]hub.updateAvailable" hidden>
      <img src="symbols/exclamationmark.arrow.triangle.2.circlepath.svg" />
    </button>
    <button class="tab-control feedback" data-i18n="[title]hub.shareFeedback" hidden>
      <img src="symbols/exclamationmark.bubble.svg" />
    </button>
    <button class="tab-control play" data-i18n="[title]hub.playback.play">
      <img src="symbols/play.fill.svg" />
    </button>
    <button class="tab-control pause" data-i18n="[title]hub.playback.pause" hidden>
      <img src="symbols/pause.svg" />
    </button>
    <button class="tab-control lock" data-i18n="[title]hub.playback.lock" hidden>
      <img src="symbols/forward.circle.svg" />
    </button>
    <button class="tab-control unlock" data-i18n="[title]hub.playback.unlock" hidden>
      <img src="symbols/forward.circle.svg" />
    </button>
    <button class="tab-control close" data-i18n="[title]hub.tabs.close">
      <img src="symbols/xmark.octagon.svg" />
    </button>
    <button class="tab-control popup" data-i18n="[title]hub.tabs.popout">
      <img src="symbols/plus.rectangle.on.rectangle.svg" />
    </button>
    <button class="tab-control add-tab" data-i18n="[title]hub.tabs.add">
      <img src="symbols/plus.svg" />
    </button>

    <div class="side-bar-background"></div>
    <div class="side-bar-shadow"></div>
    <div class="viewer-background"></div>
    <div class="side-bar-handle"></div>

    <span id="dragItem"></span>

    <div class="loading-glow"></div>

    <div class="search-results" hidden></div>

    <div class="side-bar">
      <div class="side-bar-title" data-i18n="hub.sidebar.titleDefault"></div>

      <div class="side-bar-search-container">
        <input
          class="side-bar-search"
          type="search"
          data-i18n="[placeholder]hub.sidebar.searchPlaceholder;[title]hub.sidebar.searchTitle"
        />
        <img class="side-bar-search-icon" src="symbols/magnifyingglass.svg" />
        <button class="side-bar-tuning-button" data-i18n="[title]hub.sidebar.tuningTitle" hidden>
          <img src="symbols/slider.horizontal.3.svg" />
        </button>
      </div>

      <span id="fieldItemIconTemplates" hidden>
        <svg class="field-item-icon" height="12" width="12">
          <polygon points="1,0 1,12 11,6"></polygon>
        </svg>
        <svg class="field-item-icon" height="12" width="12">
          <polygon points="12,1 0,1 6,11"></polygon>
        </svg>
        <svg class="field-item-icon" height="12" width="12">
          <rect x="1" y="5" width="10" height="2"></rect>
        </svg>
      </span>

      <span id="fieldList"></span>
    </div>

    <div class="viewer">
      <div class="tab-bar"></div>
      <div class="tab-bar-shadow-left"></div>
      <div class="tab-bar-shadow-right"></div>
      <div class="tab-bar-drag-highlight" hidden></div>
      <div class="tab-bar-scroll" tabindex="-1">
        <div class="tab-bar-scroll-content"></div>
      </div>

      <div class="timeline">
        <canvas class="timeline-canvas"></canvas>
        <div class="timeline-scroll" tabindex="-1">
          <div class="timeline-scroll-content"></div>
        </div>
      </div>

      <div class="renderer-content"></div>
      <div class="controls-content"></div>
      <div class="controls-handle"></div>
    </div>

    <div class="fps"></div>

    <span id="controllerTemplates" hidden>
      <!-- Documentation -->
      <div id="controller0"></div>

      <!-- Line Graph -->
      <div id="controller1">
        <div class="line-graph-axis line-graph-left"></div>
        <div class="line-graph-axis line-graph-right"></div>
        <div class="line-graph-axis line-graph-discrete"></div>
      </div>

      <!-- 2D Field -->
      <div id="controller2">
        <div class="field-2d-sources"></div>
        <div class="field-2d-settings setting-blocks fix-first">
          <div class="title">
            <div class="full" data-i18n="hub.field.label"></div>
          </div>
          <div class="field input">
            <div>
              <select class="field-select" data-i18n="[title]hub.field.selectTitle2d">
                <optgroup data-i18n="[label]hub.field.frc"></optgroup>
                <optgroup data-i18n="[label]hub.field.ftc"></optgroup>
              </select>
              <a class="field-source" href="#" data-i18n="[title]hub.field.sourceTitle;hub.field.source"></a>
            </div>
          </div>

          <div class="title">
            <div class="half" data-i18n="hub.field.orientationLabel"></div>
            <div class="half" data-i18n="hub.field.sizeLabel"></div>
          </div>
          <div class="orientation input tall">
            <div class="half">
              <div class="orientation-switcher split split-2">
                <div tabindex="0" data-i18n="[title]hub.field.rotateClockwise">
                  <img class="invertable" src="symbols/rotate.right.svg" />
                </div>
                <div tabindex="0" data-i18n="[title]hub.field.rotateCounterClockwise">
                  <img class="invertable" src="symbols/rotate.left.svg" />
                </div>
              </div>
            </div>
            <div class="half">
              <div class="size-switcher split split-3">
                <div tabindex="0" data-i18n="[title]hub.field.sizeLarge">
                  <img class="invertable frc-only" src="symbols/30.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/18.square.fill.svg" />
                </div>
                <div tabindex="0" data-i18n="[title]hub.field.sizeMedium">
                  <img class="invertable frc-only" src="symbols/27.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/16.square.fill.svg" />
                </div>
                <div tabindex="0" data-i18n="[title]hub.field.sizeSmall">
                  <img class="invertable frc-only" src="symbols/24.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/14.square.fill.svg" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 3D Field -->
      <div id="controller3">
        <div class="field-3d-sources"></div>
        <div class="field-3d-settings setting-blocks fix-first">
          <div class="title">
            <div class="full" data-i18n="hub.field.label"></div>
          </div>
          <div class="field input">
            <div>
              <select class="field-select" data-i18n="[title]hub.field.selectTitle3d">
                <optgroup data-i18n="[label]hub.field.frc"></optgroup>
                <optgroup data-i18n="[label]hub.field.ftc"></optgroup>
              </select>
            </div>
          </div>

          <div class="xr-control title">
            <div class="full" data-i18n="hub.field.xrTitle"></div>
          </div>
          <div class="xr-control input tall">
            <div class="full">
              <div class="split split-1">
                <div class="xr-button" tabindex="0" data-i18n="[title]hub.field.xrStart">
                  <img src="symbols/sparkles.square.filled.on.square.svg" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div id="controller4"></div>

      <!-- Console -->
      <div id="controller5"></div>

      <!-- Statistics -->
      <div id="controller6">
        <div class="stats-sources"></div>
        <div class="stats-settings setting-blocks fix-second">
          <div class="title">
            <div class="full" data-i18n="hub.statistics.timeRange"></div>
          </div>
          <div class="input">
            <div>
              <select class="time-range" data-i18n="[title]hub.statistics.timeRangeSelectTitle">
                <option value="visible" data-i18n="hub.statistics.timeRangeVisible"></option>
                <option value="full" data-i18n="hub.statistics.timeRangeFull"></option>
                <option value="enabled" data-i18n="hub.statistics.timeRangeEnabled"></option>
                <option value="auto" data-i18n="hub.statistics.timeRangeAuto"></option>
                <option value="teleop" data-i18n="hub.statistics.timeRangeTeleop"></option>
                <option class="live-only" value="live-30" data-i18n="hub.statistics.timeRangeLive30"></option>
                <option class="live-only" value="live-10" data-i18n="hub.statistics.timeRangeLive10"></option>
              </select>
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.statistics.dataRange"></div>
          </div>
          <div class="input">
            <div class="half">
              <input class="range-min" type="number" data-i18n="[title]hub.statistics.dataRangeMin" />
            </div>
            <div class="half">
              <input class="range-max" type="number" data-i18n="[title]hub.statistics.dataRangeMax" />
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.statistics.stepSize"></div>
          </div>
          <div class="input">
            <div>
              <input class="step-size" type="number" data-i18n="[title]hub.statistics.stepSizeTitle" />
            </div>
          </div>
        </div>
      </div>

      <!-- Video -->
      <div id="controller7">
        <div class="video-source">
          <button data-i18n="[title]hub.video.local">
            <img src="symbols/doc.fill.svg" />
          </button>
          <button data-i18n="[title]hub.video.clipboard">
            <img src="symbols/list.clipboard.fill.svg" />
            <svg><path /></svg>
          </button>
          <button data-i18n="[title]hub.video.tba">
            <img src="symbols/tba_lamp.svg" />
            <svg><path /></svg>
          </button>
        </div>
        <div class="video-synchronization">
          <div class="video-timeline-section">
            <button data-i18n="[title]hub.video.syncLock">
              <img src="symbols/lock.open.svg" />
            </button>
            <button data-i18n="[title]hub.video.syncUnlock" hidden>
              <img src="symbols/lock.svg" />
            </button>
            <div class="video-timeline-container">
              <input
                class="video-timeline-slider"
                id="timeline"
                type="range"
                value="0"
                min="1"
                max="1"
                step="1"
                data-i18n="[title]hub.video.sliderTitle"
              />
              <div class="video-timeline-marker-container">
                <div></div>
              </div>
            </div>
          </div>
          <div class="video-timeline-controls">
            <button data-i18n="[title]hub.video.goBack5s">
              <img src="symbols/gobackward.5.svg" />
            </button>
            <button data-i18n="[title]hub.video.prevFrame">
              <img src="symbols/backward.frame.svg" />
            </button>
            <button data-i18n="[title]hub.video.play">
              <img src="symbols/play.fill.svg" />
            </button>
            <button data-i18n="[title]hub.video.pause" hidden>
              <img src="symbols/pause.svg" />
            </button>
            <button data-i18n="[title]hub.video.nextFrame">
              <img src="symbols/forward.frame.svg" />
            </button>
            <button data-i18n="[title]hub.video.goForward5s">
              <img src="symbols/goforward.5.svg" />
            </button>
          </div>
        </div>
      </div>

      <!-- Joysticks -->
      <div id="controller8">
        <table class="joystick-selector">
          <tbody>
            <tr>
              <td>
                <span data-i18n="hub.joysticks.port0"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
              <td>
                <span data-i18n="hub.joysticks.port1"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
              <td>
                <span data-i18n="hub.joysticks.port2"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
            </tr>
            <tr>
              <td>
                <span data-i18n="hub.joysticks.port3"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
              <td>
                <span data-i18n="hub.joysticks.port4"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
              <td>
                <span data-i18n="hub.joysticks.port5"></span>
                <select data-i18n="[title]hub.joysticks.selectTitle"></select>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Swerve -->
      <div id="controller9">
        <div class="swerve-sources"></div>
        <div class="swerve-settings setting-blocks fix-second">
          <div class="title">
            <div class="full" data-i18n="hub.swerve.maxSpeed"></div>
          </div>
          <div class="input">
            <div>
              <input class="max-speed" type="number" value="5" data-i18n="[title]hub.swerve.maxSpeedTitle" />
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.swerve.frameSize"></div>
          </div>
          <div class="input">
            <div class="half">
              <input
                class="size-x"
                type="number"
                value="0.65"
                step="0.01"
                data-i18n="[title]hub.swerve.frameLengthTitle"
              />
            </div>
            <div class="half">
              <input
                class="size-y"
                type="number"
                value="0.65"
                step="0.01"
                data-i18n="[title]hub.swerve.frameWidthTitle"
              />
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.field.orientationLabel"></div>
          </div>
          <div class="input">
            <div class="orientation-switcher split split-2">
              <div tabindex="0" data-i18n="[title]hub.swerve.rotateModuleClockwise">
                <img class="invertable" src="symbols/rotate.right.svg" />
              </div>
              <div tabindex="0" data-i18n="[title]hub.swerve.rotateModuleCounterClockwise">
                <img class="invertable" src="symbols/rotate.left.svg" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mechanism -->
      <div id="controller10">
        <div class="mechanism-sources"></div>
      </div>

      <!-- Points -->
      <div id="controller11">
        <div class="points-sources"></div>
        <div class="points-settings setting-blocks fix-second">
          <div class="title">
            <div class="full" data-i18n="hub.points.dimensions"></div>
          </div>
          <div class="input">
            <div class="half">
              <input class="dimensions-width" type="number" value="960" step="1" data-i18n="[title]hub.points.width" />
            </div>
            <div class="half">
              <input
                class="dimensions-height"
                type="number"
                value="720"
                step="1"
                data-i18n="[title]hub.points.height"
              />
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.field.orientationLabel"></div>
          </div>
          <div class="input">
            <div>
              <select class="orientation" data-i18n="[title]hub.points.orientation">
                <option value="xr,yd">+X right, +Y down</option>
                <option value="xr,yu">+X right, +Y up</option>
                <option value="xu,yl">+X up, +Y left</option>
              </select>
            </div>
          </div>

          <div class="title">
            <div class="full" data-i18n="hub.points.origin"></div>
          </div>
          <div class="input">
            <div>
              <select class="origin" data-i18n="[title]hub.points.origin">
                <option value="ul">upper left</option>
                <option value="ur">upper right</option>
                <option value="ll">lower left</option>
                <option value="lr">lower right</option>
                <option value="c">center</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Metadata -->
      <div id="controller12"></div>
    </span>

    <span id="rendererTemplates" hidden>
      <!-- Documentation -->
      <div id="renderer0">
        <div class="documentation-container">
          <iframe></iframe>
        </div>
      </div>

      <!-- Line Graph -->
      <div id="renderer1">
        <canvas class="line-graph-canvas"></canvas>
        <div class="line-graph-scroll" tabindex="-1">
          <div class="line-graph-scroll-content"></div>
        </div>
        <div class="line-graph-help">
          <div class="line-graph-help-container">
            <div class="line-graph-help-row">
              <img src="symbols/arrow.up.and.down.svg" class="line-graph-help-icon" />
              <span data-i18n="hub.lineGraph.helpScrollToZoom"></span>
            </div>
            <div class="line-graph-help-row">
              <img src="symbols/arrow.left.and.right.svg" class="line-graph-help-icon" />
              <span data-i18n="hub.lineGraph.helpDragToPan"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- 2D Field -->
      <div id="renderer2">
        <div class="field-2d-canvas-container">
          <canvas class="field-2d-canvas"></canvas>
        </div>
        <div class="field-2d-heatmap-container" hidden></div>
      </div>

      <!-- 3D Field -->
      <div id="renderer3">
        <div class="field-3d-canvas-container">
          <canvas class="field-3d-canvas"></canvas>
          <div class="field-3d-alert" hidden></div>
        </div>
        <div class="spinner-cubes-container">
          <div class="spinner-cubes">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div id="renderer4">
        <img class="large-table-hand-icon" src="symbols/rectangle.and.hand.point.up.left.filled.svg" />

        <span class="data-table-header-template" hidden>
          <div class="data-table-key-container">
            <span></span>
          </div>
          <button class="data-table-key-delete" data-i18n="[title]satellite.tableDelete">
            <img src="symbols/xmark.svg" />
          </button>
        </span>

        <div class="data-table-container">
          <table class="data-table">
            <tbody>
              <tr>
                <th>
                  <input class="data-table-jump-input" type="number" data-i18n="[title]satellite.tableJumpTitle" />
                  <button class="data-table-jump-button" data-i18n="[title]satellite.tableJumpTitle">
                    <img src="symbols/arrow.down.to.line.svg" />
                  </button>
                </th>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="data-table-drag-highlight" hidden></div>
      </div>

      <!-- Console -->
      <div id="renderer5">
        <img class="large-table-hand-icon" src="symbols/rectangle.and.hand.point.up.left.filled.svg" />

        <div class="console-table-drag-highlight" hidden></div>
        <div class="console-table-container">
          <table class="console-table">
            <tbody>
              <tr>
                <th>
                  <input class="console-table-jump-input" type="number" data-i18n="[title]satellite.tableJumpTitle" />
                  <button class="console-table-jump-button" data-i18n="[title]satellite.tableJumpTitle">
                    <img src="symbols/arrow.down.to.line.svg" />
                  </button>
                </th>
                <th>
                  <div>
                    <span></span>
                    <button class="console-table-key-delete" data-i18n="[title]satellite.tableDelete">
                      <img src="symbols/xmark.svg" />
                    </button>
                  </div>
                  <button class="export-button" data-i18n="[title]hub.console.exportLog">
                    <img src="symbols/square.and.arrow.down.svg" />
                  </button>
                  <button class="highlight-button" data-i18n="[title]satellite.consoleHighlight">
                    <img src="symbols/paintpalette.fill.svg" />
                  </button>
                  <input
                    class="filter"
                    type="search"
                    data-i18n="[placeholder]satellite.consoleFilterPlaceholder;[title]satellite.consoleFilterTitle"
                  />
                </th>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Statistics -->
      <div id="renderer6">
        <div class="stats-values-container" tabindex="-1">
          <table class="stats-values">
            <tbody></tbody>
          </table>
        </div>

        <div class="stats-histogram-container">
          <canvas width="100" height="100"></canvas>
        </div>
      </div>

      <!-- Video -->
      <div id="renderer7">
        <div class="video-container">
          <img />
        </div>
      </div>

      <!-- Joysticks -->
      <div id="renderer8">
        <canvas class="joysticks-canvas"></canvas>
      </div>

      <!-- Swerve -->
      <div id="renderer9">
        <div class="swerve-canvas-container">
          <canvas class="swerve-canvas" width="100" height="100"></canvas>
        </div>
      </div>

      <!-- Mechanism -->
      <div id="renderer10">
        <div class="mechanism-svg-container">
          <svg class="mechanism-svg"></svg>
        </div>
      </div>

      <!-- Points -->
      <div id="renderer11">
        <div class="points-background-container">
          <div class="points-background"></div>
          <span hidden>
            <svg height="20" width="20">
              <line x1="10" y1="0" x2="10" y2="20"></line>
              <line x1="0" y1="10" x2="20" y2="10"></line>
            </svg>
            <svg height="20" width="20">
              <line x1="2" y1="2" x2="18" y2="18"></line>
              <line x1="18" y1="2" x2="2" y2="18"></line>
            </svg>
            <svg height="20" width="20">
              <circle cx="10" cy="10" r="7"></circle>
            </svg>
          </span>
        </div>
      </div>

      <!-- Metadata -->
      <div id="renderer12">
