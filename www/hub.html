<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; connect-src ws: http: file: blob:"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; connect-src ws: http: file: blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="hub.css" />
    <link rel="stylesheet" href="renderers.css" />
    <script type="module" src="../bundles/hub.js"></script>
    <title>AdvantageScope</title>
  </head>

  <body>
    <div class="title-bar" hidden>
      <div class="title-bar-text">AdvantageScope</div>
    </div>
    <div class="title-bar-menu">
      <table>
        <td><button title="App menu">App</button></td>
        <td><button title="File menu">File</button></td>
        <td><button title="View menu">View</button></td>
        <td><button title="Tabs menu">Tabs</button></td>
        <td class="hide-lite"><button title="Window menu">Window</button></td>
        <td><button title="Help menu">Help</button></td>
      </table>
    </div>

    <button class="tab-control update" title="Update available" hidden>
      <img src="symbols/exclamationmark.arrow.triangle.2.circlepath.svg" />
    </button>
    <button class="tab-control feedback" title="Share feedback" hidden>
      <img src="symbols/exclamationmark.bubble.svg" />
    </button>
    <button class="tab-control play" title="Play">
      <img src="symbols/play.fill.svg" />
    </button>
    <button class="tab-control pause" title="Pause" hidden>
      <img src="symbols/pause.svg" />
    </button>
    <button class="tab-control lock" title="Lock playback to real-time" hidden>
      <img src="symbols/forward.circle.svg" />
    </button>
    <button class="tab-control unlock" title="Unlock playback" hidden>
      <img src="symbols/forward.circle.svg" />
    </button>
    <button class="tab-control close" title="Close tab">
      <img src="symbols/xmark.octagon.svg" />
    </button>
    <button class="tab-control popup" title="Pop out tab">
      <img src="symbols/plus.rectangle.on.rectangle.svg" />
    </button>
    <button class="tab-control add-tab" title="Add tab">
      <img src="symbols/plus.svg" />
    </button>

    <div class="side-bar-background"></div>
    <div class="side-bar-shadow"></div>
    <div class="viewer-background"></div>
    <div class="side-bar-handle"></div>

    <span id="dragItem"></span>

    <div class="loading-glow"></div>

    <div class="search-results" hidden></div>

    <div class="side-bar">
      <div class="side-bar-title">No data available</div>

      <div class="side-bar-search-container">
        <input class="side-bar-search" type="search" placeholder="Search" title="Search fields" />
        <img class="side-bar-search-icon" src="symbols/magnifyingglass.svg" />
        <button class="side-bar-tuning-button" title="Toggle tuning mode" hidden>
          <img src="symbols/slider.horizontal.3.svg" />
        </button>
      </div>

      <span id="fieldItemIconTemplates" hidden>
        <svg class="field-item-icon" height="12" width="12">
          <polygon points="1,0 1,12 11,6"></polygon>
        </svg>
        <svg class="field-item-icon" height="12" width="12">
          <polygon points="12,1 0,1 6,11"></polygon>
        </svg>
        <svg class="field-item-icon" height="12" width="12">
          <rect x="1" y="5" width="10" height="2"></rect>
        </svg>
      </span>

      <span id="fieldList"></span>
    </div>

    <div class="viewer">
      <div class="tab-bar"></div>
      <div class="tab-bar-shadow-left"></div>
      <div class="tab-bar-shadow-right"></div>
      <div class="tab-bar-drag-highlight" hidden></div>
      <div class="tab-bar-scroll" tabindex="-1">
        <div class="tab-bar-scroll-content"></div>
      </div>

      <div class="timeline">
        <canvas class="timeline-canvas"></canvas>
        <div class="timeline-scroll" tabindex="-1">
          <div class="timeline-scroll-content"></div>
        </div>
      </div>

      <div class="renderer-content"></div>
      <div class="controls-content"></div>
      <div class="controls-handle"></div>
    </div>

    <div class="fps"></div>

    <span id="controllerTemplates" hidden>
      <!-- Documentation -->
      <div id="controller0"></div>

      <!-- Line Graph -->
      <div id="controller1">
        <div class="line-graph-axis line-graph-left"></div>
        <div class="line-graph-axis line-graph-right"></div>
        <div class="line-graph-axis line-graph-discrete"></div>
      </div>

      <!-- 2D Field -->
      <div id="controller2">
        <div class="field-2d-sources"></div>
        <div class="field-2d-settings setting-blocks fix-first">
          <div class="title">
            <div class="full">Field</div>
          </div>
          <div class="field input">
            <div>
              <select class="field-select" title="Select field image">
                <optgroup label="FRC Fields"></optgroup>
                <optgroup label="FTC Fields"></optgroup>
              </select>
              <a class="field-source" href="#" title="Open field image source URL">Source</a>
            </div>
          </div>

          <div class="title">
            <div class="half">Orientation</div>
            <div class="half">Size</div>
          </div>
          <div class="orientation input tall">
            <div class="half">
              <div class="orientation-switcher split split-2">
                <div tabindex="0" title="Rotate field clockwise">
                  <img class="invertable" src="symbols/rotate.right.svg" />
                </div>
                <div tabindex="0" title="Rotate field counter-clockwise">
                  <img class="invertable" src="symbols/rotate.left.svg" />
                </div>
              </div>
            </div>
            <div class="half">
              <div class="size-switcher split split-3">
                <div tabindex="0" title="Large robot size">
                  <img class="invertable frc-only" src="symbols/30.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/18.square.fill.svg" />
                </div>
                <div tabindex="0" title="Medium robot size">
                  <img class="invertable frc-only" src="symbols/27.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/16.square.fill.svg" />
                </div>
                <div tabindex="0" title="Small robot size">
                  <img class="invertable frc-only" src="symbols/24.square.fill.svg" />
                  <img class="invertable ftc-only" src="symbols/14.square.fill.svg" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 3D Field -->
      <div id="controller3">
        <div class="field-3d-sources"></div>
        <div class="field-3d-settings setting-blocks fix-first">
          <div class="title">
            <div class="full">Field</div>
          </div>
          <div class="field input">
            <div>
              <select class="field-select" title="Select field model">
                <optgroup label="FRC Fields"></optgroup>
                <optgroup label="FTC Fields"></optgroup>
              </select>
            </div>
          </div>

          <div class="xr-control title">
            <div class="full">XR</div>
          </div>
          <div class="xr-control input tall">
            <div class="full">
              <div class="split split-1">
                <div class="xr-button" tabindex="0" title="Start XR streaming">
                  <img src="symbols/sparkles.square.filled.on.square.svg" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div id="controller4"></div>

      <!-- Console -->
      <div id="controller5"></div>

      <!-- Statistics -->
      <div id="controller6">
        <div class="stats-sources"></div>
        <div class="stats-settings setting-blocks fix-second">
          <div class="title">
            <div class="full">Time Range</div>
          </div>
          <div class="input">
            <div>
              <select class="time-range" title="Select time range">
                <option value="visible">Visible Range</option>
                <option value="full">Full Log</option>
                <option value="enabled">Enabled</option>
                <option value="auto">Auto</option>
                <option value="teleop">Teleop</option>
                <option class="live-only" value="live-30">Live: 30 Seconds</option>
                <option class="live-only" value="live-10">Live: 10 Seconds</option>
              </select>
            </div>
          </div>

          <div class="title">
            <div class="full">Data Range</div>
          </div>
          <div class="input">
            <div class="half">
              <input class="range-min" type="number" title="Minimum histogram value" />
            </div>
            <div class="half">
              <input class="range-max" type="number" title="Maximum histogram value" />
            </div>
          </div>

          <div class="title">
            <div class="full">Step Size</div>
          </div>
          <div class="input">
            <div>
              <input class="step-size" type="number" title="Histogram step size" />
            </div>
          </div>
        </div>
      </div>

      <!-- Video -->
      <div id="controller7">
        <div class="video-source">
          <button title="Open local video file">
            <img src="symbols/doc.fill.svg" />
          </button>
          <button title="Paste YouTube video URL">
            <img src="symbols/list.clipboard.fill.svg" />
            <svg><path /></svg>
          </button>
          <button title="Download match video from The Blue Alliance">
            <img src="symbols/tba_lamp.svg" />
            <svg><path /></svg>
          </button>
        </div>
        <div class="video-synchronization">
          <div class="video-timeline-section">
            <button title="Lock video timeline synchronization">
              <img src="symbols/lock.open.svg" />
            </button>
            <button title="Unlock video timeline synchronization" hidden>
              <img src="symbols/lock.svg" />
            </button>
            <div class="video-timeline-container">
              <input
                class="video-timeline-slider"
                id="timeline"
                type="range"
                value="0"
                min="1"
                max="1"
                step="1"
                title="Video timeline"
              />
              <div class="video-timeline-marker-container">
                <div></div>
              </div>
            </div>
          </div>
          <div class="video-timeline-controls">
            <button title="Go back 5 seconds">
              <img src="symbols/gobackward.5.svg" />
            </button>
            <button title="Previous frame">
              <img src="symbols/backward.frame.svg" />
            </button>
            <button title="Play video">
              <img src="symbols/play.fill.svg" />
            </button>
            <button title="Pause video" hidden>
              <img src="symbols/pause.svg" />
            </button>
            <button title="Next frame">
              <img src="symbols/forward.frame.svg" />
            </button>
            <button title="Go forward 5 seconds">
              <img src="symbols/goforward.5.svg" />
            </button>
          </div>
        </div>
      </div>

      <!-- Joysticks -->
      <div id="controller8">
        <table class="joystick-selector">
          <tbody>
            <tr>
              <td>
                0:
                <select title="Select joystick data source"></select>
              </td>
              <td>
                1:
                <select title="Select joystick data source"></select>
              </td>
              <td>
                2:
                <select title="Select joystick data source"></select>
              </td>
            </tr>
            <tr>
              <td>
                3:
                <select title="Select joystick data source"></select>
              </td>
              <td>
                4:
                <select title="Select joystick data source"></select>
              </td>
              <td>
                5:
                <select title="Select joystick data source"></select>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Swerve -->
      <div id="controller9">
        <div class="swerve-sources"></div>
        <div class="swerve-settings setting-blocks fix-second">
          <div class="title">
            <div class="full">Max Speed (m/s)</div>
          </div>
          <div class="input">
            <div>
              <input class="max-speed" type="number" value="5" title="Maximum speed (meters per second)" />
            </div>
          </div>

          <div class="title">
            <div class="full">Frame Size (m)</div>
          </div>
          <div class="input">
            <div class="half">
              <input class="size-x" type="number" value="0.65" step="0.01" title="Robot frame length (meters)" />
            </div>
            <div class="half">
              <input class="size-y" type="number" value="0.65" step="0.01" title="Robot frame width (meters)" />
            </div>
          </div>

          <div class="title">
            <div class="full">Orientation</div>
          </div>
          <div class="input">
            <div class="orientation-switcher split split-2">
              <div tabindex="0" title="Rotate swerve module layout clockwise">
                <img class="invertable" src="symbols/rotate.right.svg" />
              </div>
              <div tabindex="0" title="Rotate swerve module layout counter-clockwise">
                <img class="invertable" src="symbols/rotate.left.svg" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mechanism -->
      <div id="controller10">
        <div class="mechanism-sources"></div>
      </div>

      <!-- Points -->
      <div id="controller11">
        <div class="points-sources"></div>
        <div class="points-settings setting-blocks fix-second">
          <div class="title">
            <div class="full">Dimensions</div>
          </div>
          <div class="input">
            <div class="half">
              <input
                class="dimensions-width"
                type="number"
                value="960"
                step="1"
                title="Coordinate system width (pixels)"
              />
            </div>
            <div class="half">
              <input
                class="dimensions-height"
                type="number"
                value="720"
                step="1"
                title="Coordinate system height (pixels)"
              />
            </div>
          </div>

          <div class="title">
            <div class="full">Orientation</div>
          </div>
          <div class="input">
            <div>
              <select class="orientation" title="Coordinate system orientation">
                <option value="xr,yd">+X right, +Y down</option>
                <option value="xr,yu">+X right, +Y up</option>
                <option value="xu,yl">+X up, +Y left</option>
              </select>
            </div>
          </div>

          <div class="title">
            <div class="full">Origin</div>
          </div>
          <div class="input">
            <div>
              <select class="origin" title="Coordinate system origin">
                <option value="ul">upper left</option>
                <option value="ur">upper right</option>
                <option value="ll">lower left</option>
                <option value="lr">lower right</option>
                <option value="c">center</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Metadata -->
      <div id="controller12"></div>
    </span>

    <span id="rendererTemplates" hidden>
      <!-- Documentation -->
      <div id="renderer0">
        <div class="documentation-container">
          <iframe></iframe>
        </div>
      </div>

      <!-- Line Graph -->
      <div id="renderer1">
        <canvas class="line-graph-canvas"></canvas>
        <div class="line-graph-scroll" tabindex="-1">
          <div class="line-graph-scroll-content"></div>
        </div>
      </div>

      <!-- 2D Field -->
      <div id="renderer2">
        <div class="field-2d-canvas-container">
          <canvas class="field-2d-canvas"></canvas>
        </div>
        <div class="field-2d-heatmap-container" hidden></div>
      </div>

      <!-- 3D Field -->
      <div id="renderer3">
        <div class="field-3d-canvas-container">
          <canvas class="field-3d-canvas"></canvas>
          <div class="field-3d-alert" hidden></div>
        </div>
        <div class="spinner-cubes-container">
          <div class="spinner-cubes">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div id="renderer4">
        <img class="large-table-hand-icon" src="symbols/rectangle.and.hand.point.up.left.filled.svg" />

        <span class="data-table-header-template" hidden>
          <div class="data-table-key-container">
            <span></span>
          </div>
          <button class="data-table-key-delete" title="Remove from view">
            <img src="symbols/xmark.svg" />
          </button>
        </span>

        <div class="data-table-container">
          <table class="data-table">
            <tbody>
              <tr>
                <th>
                  <input class="data-table-jump-input" type="number" placeholder="0.000" title="Go to timestamp" />
                  <button class="data-table-jump-button" title="Go to timestamp">
                    <img src="symbols/arrow.down.to.line.svg" />
                  </button>
                </th>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="data-table-drag-highlight" hidden></div>
      </div>

      <!-- Console -->
      <div id="renderer5">
        <img class="large-table-hand-icon" src="symbols/rectangle.and.hand.point.up.left.filled.svg" />

        <div class="console-table-drag-highlight" hidden></div>
        <div class="console-table-container">
          <table class="console-table">
            <tbody>
              <tr>
                <th>
                  <input class="console-table-jump-input" type="number" placeholder="0.000" title="Go to timestamp" />
                  <button class="console-table-jump-button" title="Go to timestamp">
                    <img src="symbols/arrow.down.to.line.svg" />
                  </button>
                </th>
                <th>
                  <div>
                    <span></span>
                    <button class="console-table-key-delete" title="Remove from view">
                      <img src="symbols/xmark.svg" />
                    </button>
                  </div>
                  <button class="export-button" title="Export console log">
                    <img src="symbols/square.and.arrow.down.svg" />
                  </button>
                  <button class="highlight-button" title="Highlight warning/error messages">
                    <img src="symbols/paintpalette.fill.svg" />
                  </button>
                  <input class="filter" type="search" placeholder="Filter" title="Filter console log" />
                </th>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Statistics -->
      <div id="renderer6">
        <div class="stats-values-container" tabindex="-1">
          <table class="stats-values">
            <tbody></tbody>
          </table>
        </div>

        <div class="stats-histogram-container">
          <canvas width="100" height="100"></canvas>
        </div>
      </div>

      <!-- Video -->
      <div id="renderer7">
        <div class="video-container">
          <img />
        </div>
      </div>

      <!-- Joysticks -->
      <div id="renderer8">
        <canvas class="joysticks-canvas"></canvas>
      </div>

      <!-- Swerve -->
      <div id="renderer9">
        <div class="swerve-canvas-container">
          <canvas class="swerve-canvas" width="100" height="100"></canvas>
        </div>
      </div>

      <!-- Mechanism -->
      <div id="renderer10">
        <div class="mechanism-svg-container">
          <svg class="mechanism-svg"></svg>
        </div>
      </div>

      <!-- Points -->
      <div id="renderer11">
        <div class="points-background-container">
          <div class="points-background"></div>
          <span hidden>
            <svg height="20" width="20">
              <line x1="10" y1="0" x2="10" y2="20"></line>
              <line x1="0" y1="10" x2="20" y2="10"></line>
            </svg>
            <svg height="20" width="20">
              <line x1="2" y1="2" x2="18" y2="18"></line>
              <line x1="18" y1="2" x2="2" y2="18"></line>
            </svg>
            <svg height="20" width="20">
              <circle cx="10" cy="10" r="7"></circle>
            </svg>
          </span>
        </div>
      </div>

      <!-- Metadata -->
      <div id="renderer12">
        <div class="tab-centered">No metadata found. Check the documentation for details on metadata publishing.</div>
        <div class="metadata-table-container" hidden>
          <table class="metadata-table">
            <tbody>
              <tr>
                <th></th>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </span>

    <span id="sourceListItemTemplate" hidden>
      <div class="item">
        <button class="type" title="Edit field configuration">
          <object data="" type="image/svg+xml" tabindex="-1"></object>
          <object data="" type="image/svg+xml" class="hidden" tabindex="-1"></object>
        </button>
        <div class="type-name"></div>
        <div class="key-container">
          <span></span>
        </div>
        <button class="hide" title="Toggle field visibility">
          <img src="symbols/eye.svg" />
        </button>
        <button class="remove" title="Remove field">
          <img src="symbols/xmark.svg" />
        </button>
        <img class="value-symbol" src="symbols/arrow.turn.down.right.svg" hidden />
        <div class="value" hidden></div>
      </div>
    </span>
  </body>
</html>
