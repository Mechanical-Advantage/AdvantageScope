<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/editRange.js"></script>
    <title data-i18n="editRange.title"></title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="label" data-i18n="editRange.labelMax"></td>
          <td class="input">
            <input type="number" id="max" data-i18n="[title]editRange.inputMaxTitle" />
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="editRange.labelMin"></td>
          <td class="input">
            <input type="number" id="min" data-i18n="[title]editRange.inputMinTitle" />
          </td>
        </tr>
      </tbody>
    </table>
    <button id="exit" data-i18n="[title]editRange.cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" data-i18n="[title]editRange.confirm">
      <img src="symbols/checkmark.svg" />
    </button>
  </body>
</html>
