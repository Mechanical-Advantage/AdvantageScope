<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/uploadAsset.js"></script>
    <title data-i18n="uploadAsset.title"></title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="input">
            <input
              type="file"
              id="asset"
              accept=".zip, application/zip"
              multiple
              data-i18n="[title]uploadAsset.inputTitle"
            />
          </td>
        </tr>
        <tr>
          <td class="info" id="progress" data-i18n="uploadAsset.progressDefault"></td>
        </tr>
      </tbody>
    </table>
    <button id="exit" data-i18n="[title]uploadAsset.cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" data-i18n="[title]uploadAsset.upload">
      <img src="symbols/checkmark.svg" />
    </button>
  </body>
</html>
