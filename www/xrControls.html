<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="xrControls.css" />
    <script type="module" src="../bundles/xrControls.js"></script>
    <title data-i18n="xrControls.title"></title>
  </head>
  <body>
    <div class="qr-container">
      <div class="qr"></div>
    </div>
    <div class="controls">
      <div class="title" data-i18n="xrControls.title"></div>
      <div class="details">
        <u data-i18n="xrControls.scanInstructions"></u> <span data-i18n="xrControls.requirements"></span>
      </div>
      <table>
        <tr>
          <td class="right" data-i18n="xrControls.calibration"></td>
          <td colspan="2">
            <select name="calibration-mode" data-i18n="[title]xrControls.calibrationSelectTitle">
              <option value="0" data-i18n="xrControls.calibrationMiniature"></option>
              <option value="1" data-i18n="xrControls.calibrationFullSizeBlue"></option>
              <option value="2" data-i18n="xrControls.calibrationFullSizeRed"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="right" data-i18n="xrControls.streaming"></td>
          <td colspan="2">
            <select name="streaming-mode" data-i18n="[title]xrControls.streamingSelectTitle">
              <option value="0" data-i18n="xrControls.streamingSmooth"></option>
              <option value="1" data-i18n="xrControls.streamingLowLatency"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td data-i18n="xrControls.showFloor"></td>
          <td data-i18n="xrControls.showField"></td>
          <td data-i18n="xrControls.showRobots"></td>
        </tr>
        <tr>
          <td><input name="show-floor" type="checkbox" data-i18n="[title]xrControls.showFloorTitle" /></td>
          <td><input name="show-field" type="checkbox" checked data-i18n="[title]xrControls.showFieldTitle" /></td>
          <td><input name="show-robots" type="checkbox" checked data-i18n="[title]xrControls.showRobotsTitle" /></td>
        </tr>
      </table>
    </div>
  </body>
</html>
