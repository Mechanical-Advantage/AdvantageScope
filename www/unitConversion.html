<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/unitConversion.js"></script>
    <title data-i18n="unitConversion.title"></title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="label" data-i18n="unitConversion.unitType"></td>
          <td class="input">
            <select id="unitType" data-i18n="[title]unitConversion.unitTypeSelectTitle"></select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="unitConversion.fromUnit"></td>
          <td class="input">
            <select id="fromUnit" data-i18n="[title]unitConversion.fromUnitSelectTitle"></select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="unitConversion.toUnit"></td>
          <td class="input">
            <select id="toUnit" data-i18n="[title]unitConversion.toUnitSelectTitle"></select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="unitConversion.extraFactor"></td>
          <td class="input">
            <input type="text" id="extraFactor" data-i18n="[title]unitConversion.extraFactorInputTitle" />
          </td>
        </tr>
      </tbody>
    </table>
    <button id="exit" data-i18n="[title]unitConversion.cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" data-i18n="[title]unitConversion.confirm">
      <img src="symbols/checkmark.svg" />
    </button>
  </body>
</html>
