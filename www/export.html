<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/export.js"></script>
    <title data-i18n="export.title"></title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="label" data-i18n="export.format"></td>
          <td class="input">
            <select id="format" data-i18n="[title]export.formatSelectTitle">
              <option value="csv-table" data-i18n="export.formatCsvTable"></option>
              <option value="csv-list" data-i18n="export.formatCsvList"></option>
              <option value="wpilog" data-i18n="export.formatWpilog"></option>
              <option value="mcap" data-i18n="export.formatMcap"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="export.timestamps"></td>
          <td class="input">
            <select id="samplingMode" data-i18n="[title]export.samplingSelectTitle">
              <option value="changes" data-i18n="export.samplingAllChanges"></option>
              <option value="fixed" data-i18n="export.samplingFixedPeriod"></option>
              <option value="akit" data-i18n="export.samplingAkit"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="export.period"></td>
          <td class="input">
            <input type="number" id="samplingPeriod" value="20" data-i18n="[title]export.periodInputTitle" />
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="export.prefixes"></td>
          <td class="input">
            <input type="text" id="prefixes" data-i18n="[title]export.prefixesInputTitle" />
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="export.fieldSet"></td>
          <td class="input">
            <select id="includeGenerated" data-i18n="[title]export.fieldSetSelectTitle">
              <option value="true" data-i18n="export.fieldSetIncludeGenerated"></option>
              <option value="false" data-i18n="export.fieldSetOriginalOnly"></option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
    <button id="exit" data-i18n="[title]export.cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" data-i18n="[title]export.export">
      <img src="symbols/arrow.down.svg" />
    </button>
    <div class="help-div">
      <a href="#" data-i18n="[title]export.helpTitle;sourceList.help"></a>
    </div>
  </body>
</html>
