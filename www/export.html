<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/export.js"></script>
    <title>Export &mdash; AdvantageScope</title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="label">Format</td>
          <td class="input">
            <select id="format" title="Select export format">
              <option value="csv-table">CSV (Table)</option>
              <option value="csv-list">CSV (List)</option>
              <option value="wpilog">WPILOG</option>
              <option value="mcap">MCAP</option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label">Timestamps</td>
          <td class="input">
            <select id="samplingMode" title="Select timestamp sampling mode">
              <option value="changes">All Changes</option>
              <option value="fixed">Fixed Period</option>
              <option value="akit">AdvantageKit Cycles</option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label">Period (ms)</td>
          <td class="input">
            <input type="number" id="samplingPeriod" value="20" title="Enter sampling period in milliseconds" />
          </td>
        </tr>
        <tr>
          <td class="label">Prefixes</td>
          <td class="input">
            <input type="text" id="prefixes" title="Enter field prefixes to export, separated by commas (optional)" />
          </td>
        </tr>
        <tr>
          <td class="label">Field Set</td>
          <td class="input">
            <select id="includeGenerated" title="Select whether to include generated fields in the export">
              <option value="true">Include Generated</option>
              <option value="false">Original Only</option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
    <button id="exit" title="Cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" title="Export">
      <img src="symbols/arrow.down.svg" />
    </button>
    <div class="help-div">
      <a href="#" title="Open export documentation">Help</a>
    </div>
  </body>
</html>
