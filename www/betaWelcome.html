<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="betaWelcome.css" />
    <script type="module" src="../bundles/betaWelcome.js"></script>
    <title data-i18n="betaWelcome.title"></title>
  </head>
  <body>
    <h1 data-i18n="betaWelcome.header"></h1>
    <h2 class="beta-only" data-i18n="betaWelcome.betaRelease"></h2>
    <h2 class="alpha-only" data-i18n="betaWelcome.alphaRelease" hidden></h2>
    <p class="desktop-only" data-i18n="betaWelcome.descDesktop"></p>
    <p class="lite-only" data-i18n="betaWelcome.descLite" hidden></p>
    <table>
      <tbody>
        <tr>
          <td>
            <input type="checkbox" />
          </td>
          <td data-i18n="betaWelcome.checkUnstable"></td>
        </tr>
        <tr>
          <td>
            <input type="checkbox" />
          </td>
          <td data-i18n="betaWelcome.checkReport"></td>
        </tr>
        <tr>
          <td>
            <input type="checkbox" />
          </td>
          <td data-i18n="betaWelcome.checkFeedback"></td>
        </tr>
      </tbody>
    </table>
    <p class="desktop-only" data-i18n="betaWelcome.helpDesktop"></p>
    <p class="lite-only" data-i18n="betaWelcome.helpLite" hidden></p>
    <button disabled data-i18n="[title]betaWelcome.continue;betaWelcome.continue"></button>
  </body>
</html>
