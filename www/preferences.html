<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="prompts.css" />
    <script type="module" src="../bundles/preferences.js"></script>
    <title data-i18n="preferences.title"></title>
  </head>

  <body>
    <table>
      <tbody>
        <tr>
          <td class="label" data-i18n="preferences.language"></td>
          <td class="input">
            <select id="language" data-i18n="[title]preferences.languageSelectTitle">
              <option value="" data-i18n="preferences.languageSystemDefault"></option>
              <option value="en-US">English (US)</option>
              <option value="es-419">Español (Latinoamérica)</option>
              <option value="fr">Français</option>
              <option value="pt-BR">Português (Brasil)</option>
              <option value="tr">Türkçe</option>
              <option value="ro">Românǎ</option>
              <option value="he">עִברִית</option>
              <option value="kk">Қазақ тілі</option>
              <option value="ru">Русский</option>
              <option value="ar">العربية</option>
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁體中文</option>
            </select>
          </td>
        </tr>
        <tr class="hide-lite">
          <td class="label" data-i18n="preferences.theme"></td>
          <td class="input">
            <select id="theme" data-i18n="[title]preferences.themeSelectTitle">
              <option value="system" data-i18n="preferences.themeSystem"></option>
              <option value="light" data-i18n="preferences.themeLight"></option>
              <option value="dark" data-i18n="preferences.themeDark"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="preferences.coordinateSystem"></td>
          <td class="input">
            <select id="coordinateSystem" data-i18n="[title]preferences.coordinateSystemSelectTitle">
              <option value="automatic" data-i18n="preferences.coordinateSystemAutomatic"></option>
              <option value="center-red" data-i18n="preferences.coordinateSystemCenterRed"></option>
              <option value="wall-blue" data-i18n="preferences.coordinateSystemWallBlue"></option>
              <option value="wall-alliance" data-i18n="preferences.coordinateSystemWallAlliance"></option>
              <option value="center-rotated" data-i18n="preferences.coordinateSystemCenterRotated"></option>
            </select>
          </td>
        </tr>
        <tr class="hide-lite">
          <td class="label" data-i18n="preferences.tbaApiKey"></td>
          <td class="input">
            <input type="text" id="tbaApiKey" data-i18n="[title]preferences.tbaApiKeyInputTitle" />
          </td>
        </tr>
        <tr>
          <td class="title" colspan="2">
            <hr />
            <span data-i18n="preferences.networkingTitle"></span>
          </td>
        </tr>
        <tr>
          <td class="subtitle" colspan="2" data-i18n="preferences.networkingSubtitle"></td>
        </tr>
        <tr class="hide-lite">
          <td class="label" data-i18n="preferences.robotAddress"></td>
          <td class="input">
            <input
              type="text"
              id="robotAddress"
              placeholder="10.00.00.2"
              data-i18n="[title]preferences.robotAddressInputTitle"
            />
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="preferences.robotLogPath"></td>
          <td class="input">
            <input type="text" id="remotePath" data-i18n="[title]preferences.robotLogPathInputTitle" />
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="preferences.liveMode"></td>
          <td class="input">
            <select id="liveSubscribeMode" data-i18n="[title]preferences.liveModeSelectTitle">
              <option value="low-bandwidth" data-i18n="preferences.liveModeLowBandwidth"></option>
              <option value="logging" data-i18n="preferences.liveModeLogging"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="preferences.discardLive"></td>
          <td class="input">
            <select id="liveDiscard" data-i18n="[title]preferences.discardLiveSelectTitle">
              <option value="60" data-i18n="preferences.discardLive1Min"></option>
              <option value="300" data-i18n="preferences.discardLive5Min"></option>
              <option value="1200" data-i18n="preferences.discardLive20Min"></option>
              <option value="-1" data-i18n="preferences.discardLiveNever"></option>
            </select>
          </td>
        </tr>
        <tr class="hide-lite">
          <td class="label" data-i18n="preferences.ntPublish"></td>
          <td class="input">
            <input type="text" id="publishFilter" data-i18n="[title]preferences.ntPublishInputTitle" />
          </td>
        </tr>
        <tr>
          <td class="title" colspan="2">
            <hr />
            <span data-i18n="preferences.renderingTitle"></span>
          </td>
        </tr>
        <tr>
          <td class="label" id="field3dModeAcLabel" data-i18n="preferences.mode3dDefault"></td>
          <td class="input">
            <select id="field3dModeAc" data-i18n="[title]preferences.mode3dDefaultSelectTitle">
              <option value="cinematic" data-i18n="preferences.mode3dCinematic"></option>
              <option value="standard" data-i18n="preferences.mode3dStandard"></option>
              <option value="low-power" data-i18n="preferences.mode3dLowPower"></option>
            </select>
          </td>
        </tr>
        <tr class="hide-lite">
          <td class="label" data-i18n="preferences.mode3dBattery"></td>
          <td class="input">
            <select id="field3dModeBattery" data-i18n="[title]preferences.mode3dBatterySelectTitle">
              <option value="" data-i18n="preferences.mode3dBatteryDefault"></option>
              <option value="cinematic" data-i18n="preferences.mode3dCinematic"></option>
              <option value="standard" data-i18n="preferences.mode3dStandard"></option>
              <option value="low-power" data-i18n="preferences.mode3dLowPower"></option>
            </select>
          </td>
        </tr>
        <tr>
          <td class="label" data-i18n="preferences.antialiasing"></td>
          <td class="input">
            <select id="field3dAntialiasing" data-i18n="[title]preferences.antialiasingSelectTitle">
              <option value="true" data-i18n="preferences.antialiasingOn"></option>
              <option value="false" data-i18n="preferences.antialiasingOff"></option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
    <button id="exit" data-i18n="[title]preferences.cancel">
      <img src="symbols/xmark.svg" />
    </button>
    <button id="confirm" data-i18n="[title]preferences.confirm">
      <img src="symbols/checkmark.svg" />
    </button>
  </body>
</html>
